job: krea2_draft
config:
  name: krea2_subject_lokr_draft
  process:
    - type: krea2_draft
      training_folder: output
      device: cuda
      trigger_word: tok

      adapter:
        path: models/adapters/subject_lokr.safetensors
        type: lokr
        rank: 32
        alpha: 32
        full_rank: true
        factor: 4
        old_format: false

      model:
        arch: krea2
        name_or_path: models/krea2/raw.safetensors
        quantize: true
        qtype: qfloat8
        quantize_te: true
        qtype_te: qfloat8
        low_vram: true
        model_kwargs:
          text_encoder_path: models/qwen3-vl-4b-instruct
          vae_path: models/qwen-image

      draft:
        steps: 8
        draft_k: 1
        guidance_scale: 4.5
        width: 512
        height: 512
        lv_samples: 0
        high_noise_shift: 0.5
        seed: 42
        checkpoint_vae: true
        train_modules: qkvo
        save_images_every: 5
        save_every: 5
        # Fixed validation prompts and seeds are sampled after updated
        # checkpoints 5, 10, ... and after the final update.
        sample_every: 5
        sample_width: 768
        sample_height: 768
        sample_prompts_path: config/examples/prompts/body_match_sample.txt
        sample_seed: 1000
        # Fixed prompt pool designed to expose body proportions while keeping
        # the face visible for the combined face + body reward.
        prompts_path: config/examples/prompts/body_match.txt
        reward:
          reference_images: data/reference
          face_weight: 1.0
          body_weight: 0.5
          face:
            model_dir: models/antelopev2
            target_similarity: 0.45
          body:
            loss_tier: somax
            sam3d_checkpoint_path: models/sam-3d-body-vith/model.ckpt
            soma_data_root: repositories/SOMA-X/assets

      train:
        steps: 30
        batch_size: 1
        gradient_accumulation: 1
        optimizer: adamw
        lr: 0.0001
        max_grad_norm: 1.0
        dtype: bf16

      save:
        dtype: bf16
        max_step_saves_to_keep: 5

      logging:
        log_every: 1
        use_ui_logger: false

meta:
  name: "[name]"
  version: "2.0"
