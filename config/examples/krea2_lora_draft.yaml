job: krea2_draft
config:
  name: krea2_subject_draft
  process:
    - type: krea2_draft
      training_folder: output
      device: cuda
      trigger_word: tok

      # Existing adapter to refine. Settings must match the safetensors file.
      adapter:
        path: models/adapters/subject_lora.safetensors
        type: lora
        rank: 32
        alpha: 32

      # Every model path is local. The runner forces Hugging Face offline mode.
      model:
        arch: krea2
        name_or_path: models/krea2/raw.safetensors
        quantize: true
        qtype: qfloat8
        quantize_te: true
        qtype_te: qfloat8
        low_vram: false
        model_kwargs:
          text_encoder_path: models/qwen3-vl-4b-instruct
          vae_path: models/qwen-image

      draft:
        steps: 8
        draft_k: 1
        guidance_scale: 4.5
        width: 512
        height: 512
        lv_samples: 0
        high_noise_shift: 0.5
        seed: 42
        checkpoint_vae: true
        train_modules: qkvo
        save_images_every: 5
        save_every: 5
        sample_every: 5
        sample_width: 768
        sample_height: 768
        sample_prompts_path: config/examples/prompts/body_match_sample.txt
        sample_seed: 1000
        prompts:
          - "[trigger] portrait photo, natural light"
          - "[trigger] full body photo, standing outdoors"
        reward:
          reference_images: data/reference
          face_weight: 1.0
          body_weight: 0.0
          face:
            model_dir: models/antelopev2
            target_similarity: 0.45
            providers:
              - CUDAExecutionProvider
              - CPUExecutionProvider

      # Exactly this many DRaFT optimizer updates are run (there is no SFT stage).
      train:
        steps: 30
        batch_size: 1
        gradient_accumulation: 1
        optimizer: adamw
        lr: 0.0001
        max_grad_norm: 1.0
        dtype: bf16

      save:
        dtype: bf16
        max_step_saves_to_keep: 5

      logging:
        log_every: 1
        use_ui_logger: false

meta:
  name: "[name]"
  version: "2.0"
